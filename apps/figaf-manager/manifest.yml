# CF manifest for Figaf Manager (the wizard app itself).
# Deployed once via BTP cockpit "Deploy Application" — no service bindings required.
# The wizard is gated by cf login --sso (passcode) rather than XSUAA.
applications:
  - name: figaf-manager
    memory: 128M
    disk_quota: 512M
    instances: 1
    buildpack: nodejs_buildpack
    command: node cloud/server.js
    random-route: true
    env:
      NODE_ENV: production
      FIGAF_LOG_LEVEL: cli
      # FIGAF_LOG_LEVEL controls the verbosity of logs emitted by the wizard.
      #│ off   │ nothing (no-op fast path)                                     │
      #├───────┼───────────────────────────────────────────────────────────────┤
      #│ cli   │ every external process: cf, btp, npm, etc.                    │
      #├───────┼───────────────────────────────────────────────────────────────┤
      #│ ipc   │ cli + every window.figaf handler call (channel, args, result) │
      #├───────┼───────────────────────────────────────────────────────────────┤
      #│ net   │ ipc + every httpsDownload / httpsJson / httpsGet              │
    
      # Optional: pin deployment template source (defaults to GitHub btp-users branch tip)
      # FIGAF_DEPLOYMENT_ZIP_URL: https://your-mirror.example.com/btp-users.zip
      FIGAF_MANAGER_MAINTENANCE: 1
      # v2 idle-self-destruct (V4 in auth-gate-implementation-plan.md §2.10).
      # When set to a positive integer, the wizard tears ITSELF down after
      # that many hours without authenticated traffic. Bounds the exposure
      # window of a wizard that an operator deployed and walked away from.
      # FIGAF_IDLE_SELF_DESTRUCT_HOURS: 24
      # FIGAF_IDLE_SELF_DESTRUCT_GRACE: 30   # warning emitted N min before
