<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Figaf Manager</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="icon" type="image/png" href="/installer/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/installer/styles.css" />
  <link rel="stylesheet" href="/installer/cloud-app.css" />
  <!-- electron-app.css intentionally omitted: no frameless-window chrome in a browser tab -->

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Injected by server.js at request time: sets window.figafMode + window.figafSession -->
  <!-- FIGAF_MODE_INJECT -->

  <!-- Mode + feature flags — must load AFTER the inject and BEFORE app.jsx -->
  <script src="/installer/mode.js"></script>

  <!-- Auth-kick one-shot: if the previous page set this flag (e.g., a /rpc
       call got 401 and we were redirected through /setup and re-claimed,
       or under XSUAA a 403 sent us to the approuter), capture it into a
       window-global and clear it so a subsequent reload doesn't re-surface
       the banner. Values: "1" = unauth, "no-scope" = JWT-valid-no-scope. -->
  <script>
    (function () {
      try {
        var raw = window.sessionStorage.getItem("figaf:auth-kicked");
        window.figafAuthKicked = !!raw;
        window.figafAuthKickedNoScope = raw === "no-scope";
        window.sessionStorage.removeItem("figaf:auth-kicked");
      } catch (_) {
        window.figafAuthKicked = false;
        window.figafAuthKickedNoScope = false;
      }
    })();
  </script>

  <!-- Browser window.figaf shim (fetch + WebSocket) — must load before app.jsx -->
  <script src="/cloud/client.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="/installer/components.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-setup.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-login.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-choice.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-config.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-ops.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-xsuaa.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-update.jsx"></script>
  <script type="text/babel" src="/installer/screens/screen-done.jsx"></script>
  <script type="text/babel" src="/installer/app.jsx"></script>
</body>
</html>
