# Release automation. Triggered when a Release is *published* on
# github.com/figaf/FigafManager (Releases tab → Draft a new release → Publish).
#
# The git tag is the single source of truth for the version. You do NOT bump
# package.json by hand — each build job stamps the tag's version (e.g. v26.5.1
# → 26.5.0) into the relevant package.json *before* building, so the artifacts
# and the self-update version they report come straight from the tag.
#
# Flow:
#   verify         (ubuntu)  — sanity-check the tag is semver; run unit tests (gate).
#   build-manager  (ubuntu)  — stamp version, build the cloud zip, attach the zip
#                              AND the CF manifest.yml (operators deploy both).
#   build-desktop  (windows) — stamp version, build the desktop app, attach the
#                              PORTABLE exe (runs without installation; the only
#                              Windows target built).
#
# Single-repo: artifacts attach to this same repo's release via the built-in
# GITHUB_TOKEN (no PAT). `permissions: contents: write` grants the upload right.
# The two build jobs run in parallel after verify and each attach their own
# artifact, so finish order doesn't matter.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The tag must be a valid 3-part semver (e.g. v26.5.1) — electron-builder
      # rejects anything else, and the self-update comparison assumes it.
      - name: Validate tag is semver
        run: |
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::Tag '$TAG' is not a valid semver version (expected vMAJOR.MINOR.PATCH, e.g. v26.5.1)"
            exit 1
          fi
          echo "Releasing version $VERSION"

      - name: Run unit tests
        run: npm test

  build-manager:
    needs: verify
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Stamp the tag version into the manager's package.json AFTER npm ci, so
      # build-zip.js names the artifact figaf-manager-app-<tag>.zip and the
      # bundled package.json (read at runtime by host.cloud.js#getInstalledVersion)
      # reports the released version.
      - name: Stamp version from tag
        run: npm pkg set version="${TAG#v}" -w apps/figaf-manager

      - name: Build cloud zip
        run: npm run build:manager

      # Publish two assets: the self-contained cloud zip AND the CF manifest.
      # The manifest is unversioned (no version field), so it ships verbatim —
      # operators deploy the zip via cockpit "Deploy Application" and reference
      # this manifest. NOTE: the manifest is published exactly as it lives in
      # the repo, including FIGAF_MANAGER_MAINTENANCE if set.
      - name: Attach cloud zip + manifest to release
        run: |
          VERSION="${TAG#v}"
          gh release upload "$TAG" \
            "apps/figaf-manager/dist/figaf-manager-app-$VERSION.zip" \
            "apps/figaf-manager/manifest.yml" \
            --clobber

  build-desktop:
    needs: verify
    runs-on: windows-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      # electron uses apps/figaf-local/package.json version as app.getVersion(),
      # and electron-builder uses it for the installer name. Stamp from the tag.
      - name: Stamp version from tag
        shell: bash
        run: npm pkg set version="${TAG#v}" -w apps/figaf-local

      # electron-builder builds only the portable exe (see win.target in
      # apps/figaf-local/package.json). It's unsigned — users get a SmartScreen
      # prompt on first run, which is expected. Portable is not an
      # electron-updater target, so no update-metadata (latest.yml) is produced.
      - name: Build Windows app
        run: npm run build:local

      # Publish the PORTABLE exe (Figaf-Installer-<v>-x64.exe) — it runs without
      # installation. The desktop self-update matches this name via
      # DESKTOP_ASSET_REGEX in packages/core/release-config.js — keep them in
      # lockstep if the artifactName changes.
      - name: Attach portable build to release
        shell: bash
        run: |
          VERSION="${TAG#v}"
          gh release upload "$TAG" "apps/figaf-local/dist/Figaf-Installer-$VERSION-x64.exe" --clobber
